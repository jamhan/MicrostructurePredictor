# Hierarchical materials taxonomy. Node ids are path-style and derived from the
# keys: "ferrous/pearlite/lamellar". Every label anywhere in the pipeline is one
# of these ids — never a bare string.
#
# Three axes live here, one tree per root. A root picks its axis with "axis:";
# roots that say nothing are on the default "microconstituent" axis, so the
# ferrous and aluminum trees below read exactly as they always did.
#
#   microconstituent  what is in the image (family / constituent / morphology)
#   alloy_grade       what the material is        -> rooted at "grade"
#   condition         how it was processed        -> rooted at "condition"
#
# The last two are the join key for distant supervision: bulk property values
# are looked up per (alloy_grade, condition) pair in data/property_lookup.csv.
# Adding a node here is vocabulary only. It asserts nothing about properties
# until a cited row for it appears in that table. See docs/DATASET_PLAN.md.
#
# Extend by adding keys; ids must stay stable once checkpoints, heads, or
# lookup rows reference them.

# --- microconstituent axis -------------------------------------------------
# Seeded with the ferrous/UHCS branch plus an aluminum family for the
# second-adapter stub.

ferrous:
  name: Ferrous alloys
  children:
    matrix:
      name: Ferritic matrix
    pearlite:
      name: Pearlite
      children:
        lamellar:
          name: Lamellar pearlite
    spheroidite:
      name: Spheroidite
      children:
        particles:
          name: Spheroidite carbide particles
    network:
      name: Proeutectoid cementite network
    widmanstatten:
      name: Widmanstatten cementite
      children:
        laths:
          name: Widmanstatten laths
    martensite:
      name: Martensite

aluminum:
  name: Aluminum alloys
  children:
    matrix:
      name: Aluminum matrix
    precipitate:
      name: Precipitates / second-phase particles

nickel:
  name: Nickel alloys
  children:
    matrix:
      name: Nickel-alloy matrix
    precipitate:
      name: Strengthening precipitates
    carbide:
      name: Carbides

# --- alloy_grade axis ------------------------------------------------------
# Ids are grade/<family>/<grade>. Two kinds of node live here: standard
# designations (AISI/AA numbers), which is what published property tables are
# keyed on, and coarse classes for sources that only report one ("medium
# carbon steel"). The UHCSDB castings get their own ids because the dataset
# identifies samples by casting, not by a standard grade.

grade:
  name: Alloy grades
  axis: alloy_grade
  children:
    ferrous:
      name: Ferrous grades
      children:
        uhcs_ac:
          name: UHCSDB casting AC
        uhcs_ac1:
          name: UHCSDB casting AC1
        low_carbon:
          name: Low-carbon steel, grade unspecified
        medium_carbon:
          name: Medium-carbon steel, grade unspecified
        high_carbon:
          name: High-carbon steel, grade unspecified
        ultrahigh_carbon:
          name: Ultrahigh-carbon steel, grade unspecified
        aisi_1018:
          name: AISI 1018
        aisi_1045:
          name: AISI 1045
        aisi_1080:
          name: AISI 1080
        aisi_4140:
          name: AISI 4140
        guan_2026_low_alloy_hs:
          name: Guan et al. (2026) low-alloy high-strength steel
        gb_35crmo:
          name: GB 35CrMo
    aluminum:
      name: Aluminum grades
      children:
        aa_6061:
          name: AA 6061
        aa_7075:
          name: AA 7075
    nickel:
      name: Nickel-alloy grades
      children:
        in718:
          name: IN718

# --- condition axis --------------------------------------------------------
# One node per physical processing route, not per phrase used to describe one.
# Normalizing is austenitizing plus a still-air cool, so it is
# condition/austenitize/air_cool and "normalized" is an alias for it in
# normalize.py rather than a second node. The axis allows a fourth level for
# the case where a route has to be split by hold temperature or time because
# the property genuinely differs across it.

condition:
  name: Processing conditions
  axis: condition
  children:
    as_built:
      name: As-built additive-manufacturing state
    heat_treat:
      name: Heat treated
      children:
        t954c_1h:
          name: Heat treated at 954 C for 1 h
        t984c_1h:
          name: Heat treated at 984 C for 1 h
        t1034c_1h:
          name: Heat treated at 1034 C for 1 h
        t1154c_1h:
          name: Heat treated at 1154 C for 1 h
    as_cast:
      name: As-cast
    hot_rolled:
      name: Hot rolled
    cold_drawn:
      name: Cold drawn
    anneal:
      name: Annealed
      children:
        full:
          name: Full anneal
        spheroidize:
          name: Spheroidize anneal
        subcritical:
          name: Subcritical (process) anneal
    austenitize:
      name: Austenitized, then cooled
      children:
        water_quench:
          name: Water quenched
          children:
            t700c_5m:
              name: 700 C for 5 min, water quenched
            t750c_5m:
              name: 750 C for 5 min, water quenched
            t800c_5m:
              name: 800 C for 5 min, water quenched
            t800c_90m:
              name: 800 C for 90 min, water quenched
            t800c_3h:
              name: 800 C for 3 h, water quenched
            t800c_8h:
              name: 800 C for 8 h, water quenched
            t800c_24h:
              name: 800 C for 24 h, water quenched
            t800c_85h:
              name: 800 C for 85 h, water quenched
            t900c_90m:
              name: 900 C for 90 min, water quenched
            t970c_3h:
              name: 970 C for 3 h, water quenched
            t970c_8h:
              name: 970 C for 8 h, water quenched
            t970c_24h:
              name: 970 C for 24 h, water quenched
            t970c_48h:
              name: 970 C for 48 h, water quenched
            t1000c_5m:
              name: 1000 C for 5 min, water quenched
        oil_quench:
          name: Oil quenched
        air_cool:
          name: Air cooled (normalized)
        furnace_cool:
          name: Furnace cooled
        unspecified_quench:
          name: Quenched, medium not recorded
    quench_temper:
      name: Quenched and tempered
    hot_roll_direct_quench:
      name: Hot rolled and online direct quenched
      children:
        t900c_to_lt150c:
          name: Direct quenched from 900 C to below 150 C by water spray
        t900c_to_lt150c_temper_t530c_90m_wq:
          name: Direct quenched from 900 C to below 150 C, tempered 530 C for 90 min, water quenched
        t900c_to_lt150c_temper_t580c_90m_wq:
          name: Direct quenched from 900 C to below 150 C, tempered 580 C for 90 min, water quenched
    homogenize_austenitize:
      name: Homogenized and austenitized
      children:
        oil_quench:
          name: Oil quenched
          children:
            t1050c_20h_t860c_2h:
              name: Homogenized 1050 C for 20 h, austenitized 860 C for 2 h, oil quenched
